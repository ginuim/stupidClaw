<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎 - Hello World</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <!-- 装饰性图标 -->
        <div class="mb-8">
            <div class="w-24 h-24 mx-auto bg-white rounded-full shadow-lg flex items-center justify-center">
                <span class="text-5xl">👋</span>
            </div>
        </div>
        
        <!-- 主标题 -->
        <h1 class="text-5xl font-bold text-gray-800 mb-4">
            Hello World!
        </h1>
        
        <!-- 副标题 -->
        <p class="text-xl text-gray-600 mb-8">
            欢迎来到 StupidClaw 项目
        </p>
        
        <!-- 按钮组 -->
        <div class="flex gap-4 justify-center">
            <a href="#" class="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors shadow-md">
                了解更多
            </a>
            <a href="#" class="px-6 py-3 bg-white text-indigo-600 border border-indigo-600 rounded-lg hover:bg-indigo-50 transition-colors shadow-md">
                联系我
            </a>
        </div>
        
        <!-- 底部提示 -->
        <p class="mt-12 text-sm text-gray-500">
            Built with ❤️ using Tailwind CSS
        </p>
    </div>
</body>
</html>
