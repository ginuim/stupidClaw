<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StupidClaw - AI 助手</title>
  </head>

  <body>
    <div class="app-container">
      <!-- 标题栏 -->
      <div class="titlebar" data-tauri-drag-region>
        <div class="titlebar-left">
          <span class="app-icon">🤖</span>
          <span class="app-title">StupidClaw</span>
          <span class="backend-status" id="backendStatus">
            <span class="status-dot status-connecting"></span>
            连接中...
          </span>
        </div>
        <div class="titlebar-right">
          <button class="titlebar-btn" id="settingsBtn" title="设置">⚙️</button>
          <button class="titlebar-btn" id="minimizeBtn" title="最小化">−</button>
          <button class="titlebar-btn close-btn" id="closeBtn" title="关闭">×</button>
        </div>
      </div>

      <!-- 聊天区域 -->
      <div class="chat-container">
        <div class="chat-window" id="chatWindow">
          <!-- 欢迎消息 -->
          <div class="welcome-message">
            <div class="welcome-icon">🤖</div>
            <h2>你好，我是 StupidClaw</h2>
            <p>你的 AI 编程助手。我可以帮你：</p>
            <ul>
              <li>💻 编写和调试代码</li>
              <li>📁 管理项目文件</li>
              <li>🔍 搜索和查询信息</li>
              <li>⏰ 设置定时任务</li>
            </ul>
          </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
          <div class="input-wrapper">
            <textarea
              id="messageInput"
              placeholder="输入消息... (Shift+Enter 换行, Enter 发送)"
              rows="1"
            ></textarea>
            <button class="send-btn" id="sendBtn" title="发送">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
              </svg>
            </button>
          </div>
          <div class="input-hints">
            <span>Enter 发送 · Shift+Enter 换行</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-header">
        <h3>⚙️ 设置</h3>
        <button class="close-settings" id="closeSettings">×</button>
      </div>
      
      <div class="settings-tabs">
        <button class="tab-btn active" data-tab="models">模型</button>
        <button class="tab-btn" data-tab="general">通用</button>
      </div>

      <div class="settings-content">
        <!-- 模型配置 Tab -->
        <div class="tab-content active" id="modelsTab">
          <!-- 当前激活的供应商 -->
          <div class="active-provider-section">
            <h4>当前使用</h4>
            <div id="activeProviderDisplay" class="active-provider-card">
              <span class="empty-text">未配置供应商</span>
            </div>
          </div>

          <!-- 供应商列表 -->
          <div class="providers-section">
            <div class="section-header">
              <h4>已配置的供应商</h4>
              <button class="btn-add" id="addProviderBtn">+ 添加</button>
            </div>
            <div id="providersList" class="providers-list">
              <!-- 动态生成 -->
            </div>
          </div>
        </div>

        <!-- 通用配置 Tab -->
        <div class="tab-content" id="generalTab">
          <div class="setting-item">
            <label>服务端口</label>
            <input type="text" id="portInput" value="8080" placeholder="8080" />
          </div>
          <div class="setting-item">
            <label>StupidIM Token</label>
            <input type="text" id="tokenInput" placeholder="访问密钥" />
          </div>
        </div>

        <div class="setting-actions">
          <button class="btn-primary" id="saveSettings">保存配置</button>
        </div>
      </div>
    </div>

    <!-- 添加供应商弹窗 -->
    <div class="modal" id="addProviderModal">
      <div class="modal-content">
        <div class="modal-header">
          <h4>添加供应商</h4>
          <button class="close-modal" id="closeModal">×</button>
        </div>
        <div class="modal-body">
          <div class="setting-item">
            <label>选择供应商</label>
            <select id="providerSelect">
              <option value="">请选择...</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="cancelAddProvider">取消</button>
          <button class="btn-primary" id="confirmAddProvider">添加</button>
        </div>
      </div>
    </div>

    <!-- 编辑供应商弹窗 -->
    <div class="modal" id="editProviderModal">
      <div class="modal-content">
        <div class="modal-header">
          <h4>配置供应商</h4>
          <button class="close-modal" id="closeEditModal">×</button>
        </div>
        <div class="modal-body">
          <div class="setting-item">
            <label>供应商</label>
            <div id="editProviderName" class="provider-name-display"></div>
          </div>
          <div class="setting-item" id="apiKeyItem">
            <label>API Key</label>
            <input type="password" id="editApiKey" placeholder="输入 API Key" />
          </div>
          <div class="setting-item" id="baseUrlItem" style="display: none;">
            <label>Base URL</label>
            <input type="text" id="editBaseUrl" placeholder="http://localhost:11434/v1" />
          </div>
          <div class="setting-item">
            <label>选择模型</label>
            <select id="editModelSelect">
              <option value="">请选择模型...</option>
            </select>
          </div>
          <div class="setting-item" id="customModelItem" style="display: none;">
            <label>自定义模型 ID</label>
            <input type="text" id="editCustomModel" placeholder="例如: gpt-4o, claude-3-sonnet" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-danger" id="deleteProviderBtn">删除</button>
          <div class="spacer"></div>
          <button class="btn-secondary" id="cancelEditProvider">取消</button>
          <button class="btn-primary" id="confirmEditProvider">保存</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
